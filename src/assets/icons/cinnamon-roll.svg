<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Cinnamon roll">
  <title>Cinnamon roll</title>

  <!-- Bun base -->
  <circle cx="100" cy="100" r="90" fill="#F5D7B8"/>

  <!-- Soft baked edge -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#E8C8A4" stroke-width="8" opacity="0.6"/>

  <!-- Main spiral -->
  <path
    d="
      M 120 100
      C 120 120 102 134 84 130
      C 65 126 58 100 70 84
      C 82 67 110 68 126 83
      C 143 99 142 126 125 144
      C 107 163 74 160 56 136
      C 38 112 45 74 75 58
      C 108 40 152 55 165 90
      C 178 126 154 168 110 178
    "
    fill="none"
    stroke="#5A3825"
    stroke-width="15"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Inner curl (organic, no donut hole) -->
  <path
    d="
      M 108 100
      C 108 110 98 116 90 111
      C 82 105 84 92 94 89
      C 102 86 108 92 108 100
    "
    fill="none"
    stroke="#5A3825"
    stroke-width="15"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
